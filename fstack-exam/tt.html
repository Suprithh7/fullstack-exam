<!DOCTYPE html>
<html>
<head>
    <title>Student Timetable</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
        }

        h1{
            margin-top:20px;
        }

        table{
            width:80%;
            margin:auto;
            border-collapse:collapse;
            background:white;
            box-shadow:0px 4px 10px gray;
        }

        th, td{
            border:1px solid black;
            padding:20px;
            text-align:center;
        }

        th{
            background:blue;
            color:white;
        }

        tr:nth-child(even){
            background:#f9f9f9;
        }
    </style>
</head>

<body>

    <h1>Student Timetable</h1>

    <table>

        <tr>
            <th>Day</th>
            <th>9:00 - 10:00</th>
            <th>10:00 - 11:00</th>
            <th>11:00 - 12:00</th>
            <th>1:00 - 2:00</th>
        </tr>

        <tr>
            <td>Monday</td>
            <td>Math</td>
            <td>DBMS</td>
            <td>Java</td>
            <td>AI & ML</td>
        </tr>

        <tr>
            <td>Tuesday</td>
            <td>Python</td>
            <td>OS</td>
            <td>CN</td>
            <td>React JS</td>
        </tr>

        <tr>
            <td>Wednesday</td>
            <td>Math</td>
            <td>Java</td>
            <td>DBMS</td>
            <td>ML Lab</td>
        </tr>

        <tr>
            <td>Thursday</td>
            <td>AI</td>
            <td>Python</td>
            <td>CN</td>
            <td>Full Stack</td>
        </tr>

        <tr>
            <td>Friday</td>
            <td>OS</td>
            <td>Java</td>
            <td>Math</td>
            <td>Project Lab</td>
        </tr>

    </table>

</body>
</html>
