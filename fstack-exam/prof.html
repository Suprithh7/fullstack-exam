<!DOCTYPE html>
<html>
<head>
    <title>Personal Profile Page</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .profile{
            background:white;
            width:350px;
            padding:30px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 4px 10px gray;
        }

        img{
            width:120px;
            height:120px;
            border-radius:50%;
        }

        h1{
            margin-top:15px;
        }

        p{
            color:gray;
        }

        button{
            background:blue;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }
    </style>
</head>

<body>

    <div class="profile">
        <img src="image.jpeg   ">

        

        <h1>Suprith</h1>

        <p>AI & ML Student</p>

        <p>
            Passionate about Full Stack Development,
            AI, and Coding.
        </p>

        <button onclick="showMessage()">
            Contact
        </button>

    </div>

    <script>

        function showMessage(){
            alert("Contact: shantha@example.com");
        }

    </script>

</body>
</html>
